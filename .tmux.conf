# === Prefix 변경 (Ctrl+Space만 사용) ===
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# === 기본 설정 ===
set-option -g history-limit 50000
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g automatic-rename off
set -g mouse on
set -g pane-border-format " #{pane_index} #{pane_current_command} "
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#ffffff,bold"

# === 복사 모드 (vi) ===
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "xclip -selection clipboard"

# 마우스 스크롤 속도 (기본 3 → 5줄씩)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 5 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 5 scroll-down

# === 플러그인 ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# yazi 파일 탐색기 (Prefix + Tab: 50% 분할)
bind Tab split-window -h -l 50% -c "#{pane_current_path}" "yazi"

# === Catppuccin 테마 ===
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# 상태 바 왼쪽: 세션 이름
set -g status-left-length 40
set -g status-left "#{E:@catppuccin_status_session}"

# 상태 바 오른쪽: 디렉토리 + Git 브랜치(ahead/behind) + CPU + 메모리 + 시간
set -g status-right-length 150
set -g status-interval 60
set -g @catppuccin_date_time_text " %m/%d %H:%M"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#[bg=default] #[fg=#a6e3a1,bg=#313244]  #(~/.config/tmux/git-status.sh #{pane_current_path}) "
set -ag status-right "#[bg=default] #[fg=#89b4fa,bg=#313244]  #{cpu_percentage} "
set -ag status-right "#[bg=default] #[fg=#f9e2af,bg=#313244]  #{ram_percentage} "
set -ag status-right "#{E:@catppuccin_status_date_time}"

# 윈도우 탭 (현재 선택 윈도우 강조)
set -g @catppuccin_window_text " #I:#{=10:window_name} "
set -g @catppuccin_window_current_text " #[bold] *#I:#W* "

# === Pane 이동 (Ctrl+Shift + 방향키, prefix 없이) ===
bind -n C-S-Left select-pane -L
bind -n C-S-Down select-pane -D
bind -n C-S-Up select-pane -U
bind -n C-S-Right select-pane -R
bind L last-window
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# === TPM 실행 ===
run '~/.tmux/plugins/tpm/tpm'
